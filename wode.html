<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日课计划 · 优雅编辑</title>
    <!-- 字体 & 图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f2f5fa 0%, #e9eef4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.5;
            color: #1e293b;
        }

        /* 主卡片 — 柔和玻璃感 */
        .plan-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2.5rem 2.2rem;
            box-shadow: 0 30px 55px -20px rgba(30, 35, 48, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        /* 头部区域 */
        .plan-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .title-section i {
            font-size: 2.2rem;
            color: #4f46e5;
            background: #e0e7ff;
            padding: 0.65rem;
            border-radius: 1.5rem;
            box-shadow: 0 6px 12px -8px #4f46e5;
        }

        .title-section h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2d3b5e, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .date-badge {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1.1rem;
            color: #2d3b5e;
            box-shadow: 0 4px 10px -6px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .date-badge i {
            color: #4f46e5;
            font-size: 1rem;
        }

        /* 灵感便签 — 可编辑区域 */
        .focus-note {
            background: #f8fafd;
            border-radius: 2rem;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid #ffffff;
            box-shadow: 0 10px 18px -12px rgba(60, 70, 100, 0.2);
        }

        .focus-note i {
            font-size: 1.8rem;
            color: #4f46e5;
            background: white;
            border-radius: 50%;
            padding: 0.5rem;
            box-shadow: 0 4px 8px -4px #b9c2d9;
        }

        .editable-motto {
            flex: 1;
            font-size: 1.2rem;
            font-weight: 430;
            color: #1e2b3f;
            background: transparent;
            border: none;
            outline: none;
            padding: 0.2rem 0;
            border-bottom: 2px dashed #cbd5e1;
            transition: border 0.15s;
        }

        .editable-motto:focus {
            border-bottom-color: #4f46e5;
        }

        .editable-motto[contenteditable="true"]:empty:before {
            content: "写下一个最重要的目标...";
            color: #94a3b8;
            font-style: italic;
            font-weight: 350;
        }

        /* 表格容器 (水平滚动小屏适应) */
        .table-wrapper {
            border-radius: 1.8rem;
            overflow-x: auto;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.4);
            padding: 0.2rem 0;
        }

        /* 计划表格 */
        .plan-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            font-size: 1rem;
        }

        .plan-table th {
            text-align: left;
            padding: 1.2rem 1rem 1rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #64748b;
            background: transparent;
            border-bottom: 2px solid #d9e2ef;
        }

        .plan-table td {
            padding: 1rem 1rem;
            border-bottom: 1px solid #e6edf5;
            vertical-align: middle;
            background: rgba(255,255,255,0.3);
            transition: background 0.2s;
        }

        .plan-table tbody tr:hover td {
            background: #f1f5f9;
        }

        /* 可编辑单元格样式 */
        .plan-table td[contenteditable="true"] {
            outline: none;
            border-radius: 12px;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .plan-table td[contenteditable="true"]:focus {
            background: white;
            box-shadow: 0 0 0 3px #c7d2fe;
        }

        /* 时间列宽度偏好 */
        .plan-table th:first-child,
        .plan-table td:first-child {
            width: 16%;
            font-weight: 500;
        }

        .plan-table th:nth-child(2),
        .plan-table td:nth-child(2) {
            width: 52%;
        }

        .plan-table th:nth-child(3),
        .plan-table td:nth-child(3) {
            width: 12%;
            text-align: center;
        }

        .plan-table th:nth-child(4),
        .plan-table td:nth-child(4) {
            width: 20%;
            text-align: center;
        }

        /* 复选框样式 (accent-color 保持现代) */
        .plan-table input[type="checkbox"] {
            width: 1.3rem;
            height: 1.3rem;
            accent-color: #4f46e5;
            cursor: pointer;
            transform: scale(1);
            transition: transform 0.1s;
        }

        .plan-table input[type="checkbox"]:hover {
            transform: scale(1.1);
        }

        /* 删除图标按钮 */
        .delete-task {
            color: #94a3b8;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0.3rem 0.6rem;
            border-radius: 2rem;
            background: transparent;
        }

        .delete-task:hover {
            color: #ef4444;
            background: #fee2e2;
            transform: scale(1.05);
        }

        /* 底部按钮区 */
        .action-bar {
            display: flex;
            justify-content: flex-start;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .btn-add {
            background: white;
            border: 1px solid #d9e2ef;
            color: #1e293b;
            font-weight: 600;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px -8px #a0afc0;
            backdrop-filter: blur(5px);
        }

        .btn-add i {
            color: #4f46e5;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-add:hover {
            background: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 12px 22px -12px #4f46e5;
            transform: translateY(-2px);
        }

        .btn-add:hover i {
            transform: rotate(90deg);
        }

        .footnote {
            margin-left: auto;
            color: #94a3b8;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .footnote i {
            font-size: 0.8rem;
        }

        /* 占位提示 */
        [contenteditable="true"]:empty:before {
            content: "⸻";
            color: #b9c7da;
            font-weight: 300;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .plan-card {
                padding: 1.8rem 1.2rem;
            }
            .title-section h1 {
                font-size: 1.8rem;
            }
            .date-badge {
                font-size: 1rem;
                padding: 0.4rem 1rem;
            }
            .focus-note {
                padding: 1rem 1.2rem;
            }
            .editable-motto {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="plan-card">
        <!-- 头部：标题 + 动态日期 -->
        <div class="plan-header">
            <div class="title-section">
                <i class="fa-regular fa-calendar-check"></i>
                <h1>日课计划</h1>
            </div>
            <div class="date-badge" id="todayDate">
                <i class="fa-regular fa-calendar"></i>
                <!-- 日期由js填充 -->
            </div>
        </div>

        <!-- 可编辑的灵感便签 (自由编辑) -->
        <div class="focus-note">
            <i class="fa-regular fa-star"></i>
            <div class="editable-motto" contenteditable="true" role="textbox" aria-multiline="false"></div>
        </div>

        <!-- 表格区域 (带水平滚动) -->
        <div class="table-wrapper">
            <table class="plan-table" id="planTable">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>任务描述</th>
                        <th>完成</th>
                        <th>管理</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 预设行 (示范 + 可编辑) -->
                    <tr>
                        <td contenteditable="true">08:30</td>
                        <td contenteditable="true">晨间冥想 & 拉伸</td>
                        <td style="text-align: center;"><input type="checkbox"></td>
                        <td style="text-align: center;"><i class="fa-regular fa-trash-can delete-task"></i></td>
                    </tr>
                    <tr>
                        <td contenteditable="true">09:15</td>
                        <td contenteditable="true">深度工作 · 核心项目推进</td>
                        <td style="text-align: center;"><input type="checkbox"></td>
                        <td style="text-align: center;"><i class="fa-regular fa-trash-can delete-task"></i></td>
                    </tr>
                    <tr>
                        <td contenteditable="true">12:00</td>
                        <td contenteditable="true">午餐 & 恢复精力</td>
                        <td style="text-align: center;"><input type="checkbox"></td>
                        <td style="text-align: center;"><i class="fa-regular fa-trash-can delete-task"></i></td>
                    </tr>
                    <tr>
                        <td contenteditable="true">15:30</td>
                        <td contenteditable="true">团队协作 / 设计评审</td>
                        <td style="text-align: center;"><input type="checkbox"></td>
                        <td style="text-align: center;"><i class="fa-regular fa-trash-can delete-task"></i></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 操作栏：添加事项 + 小提示 -->
        <div class="action-bar">
            <button class="btn-add" id="addRowBtn">
                <i class="fa-solid fa-plus"></i> 添加一项
            </button>
            <div class="footnote">
                <i class="fa-regular fa-pen-to-square"></i> 点击单元格直接编辑
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 显示今日日期 ----------
            const dateEl = document.getElementById('todayDate');
            if (dateEl) {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                const weekday = weekdays[now.getDay()];
                dateEl.innerHTML = `<i class="fa-regular fa-calendar"></i> ${year}.${month}.${day} ${weekday}`;
            }

            // ---------- 表格行操作：添加 / 删除 (事件委托) ----------
            const tbody = document.getElementById('tableBody');
            const addBtn = document.getElementById('addRowBtn');

            // 删除功能 (委托)
            tbody.addEventListener('click', (e) => {
                // 点击垃圾桶图标 (i.fa-trash-can) 或点击了它的父级
                const deleteIcon = e.target.closest('.delete-task');
                if (!deleteIcon) return;

                const tr = deleteIcon.closest('tr');
                if (tr && tr.parentNode === tbody) {
                    // 可以选择性确认，但为了流畅不弹窗
                    tr.remove();
                }
            });

            // 添加新行
            addBtn.addEventListener('click', () => {
                const newRow = document.createElement('tr');

                // 时间单元格 (可编辑)
                const tdTime = document.createElement('td');
                tdTime.setAttribute('contenteditable', 'true');
                tdTime.innerText = '';      // 留空，由用户输入
                // 任务单元格 (可编辑)
                const tdTask = document.createElement('td');
                tdTask.setAttribute('contenteditable', 'true');
                tdTask.innerText = '';
                // 完成单元格 (复选框)
                const tdCheck = document.createElement('td');
                tdCheck.style.textAlign = 'center';
                const checkInput = document.createElement('input');
                checkInput.type = 'checkbox';
                tdCheck.appendChild(checkInput);
                // 管理单元格 (删除图标)
                const tdManage = document.createElement('td');
                tdManage.style.textAlign = 'center';
                const deleteIcon = document.createElement('i');
                deleteIcon.className = 'fa-regular fa-trash-can delete-task';
                tdManage.appendChild(deleteIcon);

                newRow.appendChild(tdTime);
                newRow.appendChild(tdTask);
                newRow.appendChild(tdCheck);
                newRow.appendChild(tdManage);

                tbody.appendChild(newRow);
                // 可选：让新行的时间单元格获得焦点
                tdTime.focus();
            });

            // 额外的优化：按回车在contenteditable中不会添加新行，但默认会插入div。保持自然。
            // 也可以阻止回车产生新块，但保留灵活。无妨。
        })();
    </script>
