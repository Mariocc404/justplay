<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>可拖拽旋转的3D地球仪 - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 30px;
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        #info a {
            color: #aaccff;
            pointer-events: auto;
            text-decoration: none;
        }
        #info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="info">🌍 鼠标拖拽旋转 | 滚轮缩放 | 星空背景 | <a href="#" target="_blank">GitHub</a></div>

    <!-- 引入 Three.js 核心库和轨道控制器 (使用 CDN) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // 使用 ES module 方式导入，更现代且可靠
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // 深空底色

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.5); // 初始相机距离

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制最高2倍像素比以保证性能
        document.body.appendChild(renderer.domElement);

        // --- 轨道控制器: 允许拖拽旋转、缩放 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // 启用惯性效果
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.enablePan = false;        // 禁用平移，保持地球在中心
        controls.minDistance = 2.0;
        controls.maxDistance = 8.0;
        controls.autoRotate = false;       // 不自动旋转，完全交由用户控制
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);

        // --- 光照设置 (为了让地球有立体感) ---
        // 环境光提供基础照明
        const ambientLight = new THREE.AmbientLight(0x404060); // 暗紫色环境光，让暗部不那么死黑
        scene.add(ambientLight);

        // 主光源 - 方向光模拟太阳
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 3, 5);
        scene.add(dirLight);

        // 辅助背光，照亮地球暗部
        const backLight = new THREE.DirectionalLight(0xccddff, 0.5);
        backLight.position.set(-5, -1, -3);
        scene.add(backLight);

        // 可选：一个小点光源从侧面补充
        const fillLight = new THREE.PointLight(0x88aaff, 0.3);
        fillLight.position.set(2, 1, 3);
        scene.add(fillLight);

        // --- 创建地球 (使用高质量纹理) ---
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64); // 半径1，分段数64保证圆滑

        // 加载纹理
        const textureLoader = new THREE.TextureLoader();
        
        // 使用 Three.js 官方示例图片 (高分辨率地球纹理)
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        // 云层纹理 (可选，为了效果更佳，但这里不使用额外球体，保持简洁)
        // const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');

        // 材质: 使用 Phong 材质配合贴图，让地球有真实的反光和凹凸感
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            normalMap: earthNormalMap,      // 法线贴图增加地形凹凸感
            specularMap: earthSpecularMap,  // 高光贴图控制海洋反光区域
            specular: new THREE.Color(0x333333), // 高光颜色设为灰，配合贴图
            shininess: 15,                  // 光泽度
            emissive: new THREE.Color(0x000000) // 无自发光
        });

        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        earth.rotation.y = 0.2; // 稍微旋转一个角度，让初始视图好看
        earth.rotation.x = 0.1; // 轻微倾斜增加真实感 (地轴倾斜约23.5度，但这里简单示意)
        scene.add(earth);

        // --- 添加星空背景 (粒子系统) 让场景更丰富 ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000; // 星星数量
        
        const positions = new Float32Array(starsCount * 3);
        const colors = new Float32Array(starsCount * 3); // 可选颜色数组

        for (let i = 0; i < starsCount; i++) {
            // 使用球面均匀分布，半径在 150 到 250 之间随机，让星星有远近层次感
            const radius = 150 + Math.random() * 100; 
            
            // 随机生成球面坐标
            const theta = Math.random() * Math.PI * 2;   // 经度
            const phi = Math.acos((Math.random() * 2) - 1); // 纬度，确保均匀分布
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;
            
            // 星星颜色：大部分为白色，略带随机蓝色或黄色倾向
            const colorVal = 0.8 + Math.random() * 0.4; // 亮度范围 0.8~1.2
            let r = colorVal;
            let g = colorVal;
            let b = colorVal;
            
            // 随机给一点色调变化
            if (Math.random() > 0.7) {
                // 偏蓝
                r *= 0.9;
                g *= 0.95;
                b *= 1.1;
            } else if (Math.random() > 0.8) {
                // 偏黄
                r *= 1.1;
                g *= 1.05;
                b *= 0.9;
            }
            
            colors[i * 3] = r;
            colors[i * 3 + 1] = g;
            colors[i * 3 + 2] = b;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // 星星材质：使用顶点颜色，关闭衰减，让星星大小恒定
        const starsMaterial = new THREE.PointsMaterial({
            size: 0.35,
            vertexColors: true,   // 使用每个顶点的颜色
            sizeAttenuation: false, // 不随距离减小大小，更像星空背景
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending // 叠加混合，让星星更亮
        });

        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // 额外添加一层更远更暗的小星星，增加深度感
        const starsGeometry2 = new THREE.BufferGeometry();
        const starsCount2 = 1500;
        const positions2 = new Float32Array(starsCount2 * 3);
        for (let i = 0; i < starsCount2; i++) {
            const radius = 300 + Math.random() * 200;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            positions2[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions2[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions2[i * 3 + 2] = radius * Math.cos(phi);
        }
        starsGeometry2.setAttribute('position', new THREE.BufferAttribute(positions2, 3));
        const starsMaterial2 = new THREE.PointsMaterial({
            size: 0.2,
            color: 0xaaccff,
            sizeAttenuation: false,
            blending: THREE.AdditiveBlending,
            opacity: 0.5
        });
        const stars2 = new THREE.Points(starsGeometry2, starsMaterial2);
        scene.add(stars2);

        // --- 可选：添加一个非常淡的光晕效果 (用简单的环境雾) 让星星和地球融合更好 ---
        scene.fog = new THREE.FogExp2(0x050510, 0.0015);

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);

            // 更新控制器 (必须，尤其启用阻尼时)
            controls.update();

            // 可以稍微让星星缓慢旋转以增加动感？为了保持静态背景，不旋转星星，或者极慢旋转
            // 这里选择不旋转星星，保持背景稳定

            // 地球也可以有微小的自转？但为了不影响用户控制，禁用自转
            // 如果想要极慢的自转，可以取消下面注释，但会与用户拖拽叠加，体验不佳，所以注释掉
            // earth.rotation.y += 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        // --- 窗口尺寸自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 控制台提示
        console.log('地球仪已加载，使用鼠标拖拽旋转查看。');
    </script>
</body>
</html>
